# Single public port (8002) fronting both the Next.js web app and the NestJS
# API — they share one origin so browser fetch/websocket calls stay
# same-origin (no CORS) and the box only needs to expose one port to the
# internet, per the "port 8001 is already taken by another service" constraint.
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  client_max_body_size 12m;
  proxy_read_timeout 90s;

  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:3001;
  }

  server {
    listen 8002;
    server_name _;

    # Socket.io (realtime order updates) — longer prefix wins over /api/
    # regardless of declaration order, so this must stay more specific.
    location /api/socket.io/ {
      proxy_pass http://api_upstream/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }

    # REST API + uploaded photos (LocalDiskProvider builds URLs as
    # {API_URL}/uploads/... and API_URL is set to .../api, so this one
    # prefix-strip rule covers both without a separate /uploads/ block).
    location /api/ {
      proxy_pass http://api_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://web_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
